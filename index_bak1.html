<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitSteed Terminal | Dynamic Video intelligence</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Modern Sans-Serif Fonts for Data Density -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-mono-data { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom scrollbar matching terminal theme */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #ef4444; }
    </style>
</head>
<body class="bg-[#090d16] text-slate-100 min-h-screen flex flex-col antialiased selection:bg-red-500 selection:text-white">

    <!-- DATA NETWORK CONTROL BAR -->
    <div class="bg-slate-950 text-[10px] font-mono-data text-slate-400 tracking-wider py-2 border-b border-slate-900 px-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <span class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
                    <span class="text-slate-300 font-bold">SYSTEM ACTIVE</span>
                </span>
                <span class="hidden sm:inline text-slate-600">|</span>
                <span class="hidden sm:inline">PROTOCOLS: SECURE SSL</span>
            </div>
            <div id="live-timestamp" class="text-right text-slate-400">2026-06-14 00:00:00 UTC</div>
        </div>
    </div>

    <!-- TERMINAL MAIN HEADER -->
    <header class="bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-800">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between gap-4">
            <div class="flex items-center gap-6">
                <a href="index.html" class="text-xl font-extrabold tracking-tighter text-white flex items-center gap-2 group">
                    <div class="bg-red-600 text-white p-1.5 rounded font-mono-data text-sm tracking-normal group-hover:bg-red-700 transition">BS</div>
                    <span>BITSTEED<span class="text-red-500 font-light">//</span>WIRE</span>
                </a>
            </div>
            
            <div class="flex items-center gap-4">
                <span class="text-xs font-mono-data text-slate-400 hidden lg:inline-block bg-slate-950 px-3 py-1.5 border border-slate-800 rounded">
                    FEED_SOURCE: <span class="text-red-400">VIDEOS.JSON</span>
                </span>
            </div>
        </div>
    </header>

    <!-- CONTENT FIELD MATRIX -->
    <main class="flex-grow container mx-auto px-4 py-6">
        
        <!-- DASHBOARD GRID FRAME WORK -->
        <div id="terminal-layout" class="opacity-0 transition-opacity duration-500 grid grid-cols-1 xl:grid-cols-4 gap-6">
            
            <!-- ROW 1: FEATURED BREAKTHROUGH PRESENTATION CELL (xl: Spans 3 columns) -->
            <div class="xl:col-span-3 flex flex-col gap-6">
                
                <div id="anchor-hero-viewport" class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden p-6 hover:border-slate-700 transition duration-300 group relative">
                    <!-- Dynamic rendering target -->
                </div>

                <!-- SUB-GRID REPOSITORY RENDER -->
                <div>
                    <div class="flex items-center justify-between border-b border-slate-800 pb-3 mb-6">
                        <h3 class="text-xs font-mono-data uppercase tracking-widest text-slate-400 flex items-center gap-2">
                            <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span> AGGREGATED FEED STREAM
                        </h3>
                        <span id="stream-count" class="text-xs font-mono-data bg-slate-900 text-slate-400 border border-slate-800 px-2 py-0.5 rounded">00 INDEXES</span>
                    </div>
                    
                    <div id="secondary-matrix-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Dynamic grid backfill target -->
                    </div>
                </div>

            </div>

            <!-- ROW 2: SIDEBAR FAST BULLET PACKS (xl: Spans 1 column) -->
            <div class="xl:col-span-1 flex flex-col gap-6">
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 sticky top-24">
                    <div class="flex items-center justify-between mb-4 border-b border-slate-800 pb-3">
                        <h3 class="text-xs font-mono-data uppercase tracking-widest text-slate-300 flex items-center gap-2">
                            ⚡ FAST TRANSMISSIONS
                        </h3>
                    </div>
                    
                    <!-- Vertical List Matrix Elements -->
                    <div id="fast-news-scroller" class="space-y-3 max-h-[680px] overflow-y-auto pr-1">
                        <!-- Dynamic sidebar target -->
                    </div>
                </div>
            </div>

        </div>

        <!-- LOADING DIAGNOSTIC PANEL -->
        <div id="diagnostic-loader" class="space-y-6">
            <div class="bg-slate-900 border border-slate-800 rounded-xl h-[400px] w-full animate-pulse flex items-center justify-center font-mono-data text-xs text-slate-500">
                LOADING DATA REPOSITORY MATRIX...
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-slate-900 border border-slate-800 h-48 rounded-xl animate-pulse"></div>
                <div class="bg-slate-900 border border-slate-800 h-48 rounded-xl animate-pulse"></div>
                <div class="bg-slate-900 border border-slate-800 h-48 rounded-xl animate-pulse"></div>
            </div>
        </div>
    </main>

    <!-- TERMINAL CONTROL REAR LAYER -->
    <footer class="bg-slate-950 border-t border-slate-900 py-8 mt-20 text-xs text-slate-500">
        <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <span class="font-mono-data text-slate-400 font-bold">BITSTEED // TERMINAL</span>
                <span class="text-slate-800">|</span>
                <p>&copy; 2026 Distribution Node Architecture.</p>
            </div>
            <div class="flex gap-6 font-mono-data text-[11px]">
                <a href="index.html" class="text-red-500 hover:underline">RELOAD_FEED</a>
                <span class="text-slate-800">/</span>
                <span class="text-slate-400">SECURE DISPATCH MODE</span>
            </div>
        </div>
    </footer>

    <!-- LOGIC PROCESSING PLATFORM ENGINE -->
    <script>
        async function runDataTerminal() {
            try {
                const response = await fetch('https://bitsteed.github.io/videos.json', { cache: "no-store" });
                if (!response.ok) throw new Error("CRITICAL ERROR: Failed to map incoming server stream array nodes.");
                
                const videos = await response.json();
                if (videos.length === 0) {
                    throw new Error("EMPTY REGISTRY: No entries found inside storage schemas.");
                }

                // Update runtime UI counter configurations
                document.getElementById('stream-count').innerText = `${String(videos.length).padStart(2, '0')} REPORTS`;

                // Layout Distribution Logic
                const leadingVideo = videos[0];
                const gridSubSet = videos.slice(1);

                // 1. RENDER PREMIUM DENSITY HERO COMPONENT
                const heroNode = document.getElementById('anchor-hero-viewport');
                heroNode.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-center">
                        <div class="lg:col-span-7 overflow-hidden rounded-lg aspect-video bg-slate-950 border border-slate-800 group-hover:border-slate-700 transition">
                            <img src="${leadingVideo.thumbnail}" alt="Data Broadcast Asset" class="w-full h-full object-cover group-hover:scale-102 transition duration-500 opacity-90 group-hover:opacity-100">
                        </div>
                        <div class="lg:col-span-5 flex flex-col justify-between h-full py-2">
                            <div>
                                <div class="flex items-center gap-2 mb-3">
                                    <span class="text-[10px] font-mono-data px-2 py-0.5 bg-red-950/80 text-red-400 border border-red-900/50 rounded uppercase tracking-wider">${leadingVideo.category}</span>
                                    <span class="text-[10px] font-mono-data text-slate-500">${leadingVideo.date}</span>
                                </div>
                                <h2 class="text-xl sm:text-2xl font-bold tracking-tight text-white group-hover:text-red-400 transition mb-3 leading-snug">
                                    <a href="detail.html?v=${leadingVideo.id}">
                                        ${leadingVideo.title}
                                    </a>
                                </h2>
                                <p class="text-slate-400 text-xs leading-relaxed line-clamp-4">${leadingVideo.summary}</p>
                            </div>
                            <div class="mt-4 pt-4 border-t border-slate-800/60 flex items-center justify-between">
                                <a href="detail.html?v=${leadingVideo.id}" class="text-xs font-mono-data text-red-500 group-hover:text-red-400 font-bold tracking-tight flex items-center gap-1">
                                    EXECUTE_BROADCAST_PLAYER <span class="group-hover:translate-x-1 transition-transform inline-block">→</span>
                                </a>
                            </div>
                        </div>
                    </div>
                `;

                // 2. RENDER THE CONTENT SECONDARY GRID MATRIX
                const secondaryNode = document.getElementById('secondary-matrix-grid');
                secondaryNode.innerHTML = '';
                
                // 3. RENDER THE SIDEBAR FAST TRANSMISSIONS
                const sidebarScroller = document.getElementById('fast-news-scroller');
                sidebarScroller.innerHTML = '';

                gridSubSet.forEach((item, index) => {
                    // Populate secondary feed blocks
                    const card = document.createElement('a');
                    card.href = `detail.html?v=${item.id}`;
                    card.className = "group bg-slate-900/40 border border-slate-800/80 p-4 rounded-xl flex items-start gap-4 hover:bg-slate-900 hover:border-slate-700 transition duration-200";
                    card.innerHTML = `
                        <div class="w-24 sm:w-32 shrink-0 aspect-video rounded overflow-hidden bg-slate-950 border border-slate-800">
                            <img src="${item.thumbnail}" alt="Cover Image" class="w-full h-full object-cover opacity-85 group-hover:opacity-100 transition">
                        </div>
                        <div class="space-y-1 min-w-0">
                            <span class="text-[9px] font-mono-data text-red-400 tracking-wider block uppercase">${item.category}</span>
                            <h4 class="text-xs sm:text-sm font-bold text-white group-hover:text-red-400 transition truncate">${item.title}</h4>
                            <p class="text-slate-400 text-[11px] line-clamp-2 leading-tight">${item.summary}</p>
                        </div>
                    `;
                    secondaryNode.appendChild(card);

                    // Simultaneously populate sidebar data rows for complete tracking density
                    const row = document.createElement('a');
                    row.href = `detail.html?v=${item.id}`;
                    row.className = "group block p-3 bg-slate-950/60 border border-slate-800/50 hover:border-slate-700 hover:bg-slate-950 rounded-lg transition duration-150";
                    row.innerHTML = `
                        <div class="flex items-center justify-between gap-2 mb-1.5">
                            <span class="text-[9px] font-mono-data bg-slate-900 text-slate-400 border border-slate-800 px-1.5 py-0.5 rounded uppercase">SYS_REF: ${String(index+1).padStart(2, '0')}</span>
                            <span class="text-[10px] font-mono-data text-slate-500">${item.date}</span>
                        </div>
                        <h5 class="text-xs font-semibold text-slate-300 group-hover:text-red-400 line-clamp-2 leading-snug transition">
                            ${item.title}
                        </h5>
                    `;
                    sidebarScroller.appendChild(row);
                });

                // Clear structural skeleton loader elements out from view layers
                document.getElementById('diagnostic-loader').classList.add('hidden');
                document.getElementById('terminal-layout').classList.remove('opacity-0');

            } catch (err) {
                console.error("Layout module runtime tracking error:", err);
                document.getElementById('diagnostic-loader').innerHTML = `
                    <div class="p-6 bg-red-950/40 border border-red-900 text-red-400 rounded-xl font-mono-data text-xs max-w-xl mx-auto text-center">
                        <p class="font-bold mb-1">SYSTEM CONFIGURATION FAULT DETECTED</p>
                        <p class="text-slate-400">${err.message}</p>
                    </div>`;
            }
        }

        // Live system terminal timestamp rendering controller
        function tickTerminalClock() {
            const now = new Date();
            const format = now.toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
            document.getElementById('live-timestamp').innerText = format;
        }

        window.addEventListener('DOMContentLoaded', () => {
            runDataTerminal();
            setInterval(tickTerminalClock, 1000);
            tickTerminalClock();
        });
    </script>
</body>
</html>
