<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Broadcast - BitSteed News</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">

    <!-- TOP NAVIGATION BANNER -->
    <header class="bg-slate-900 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black tracking-wider text-red-500 flex items-center gap-2">
                <span class="bg-red-600 text-white px-2 py-0.5 rounded text-sm">LIVE</span> BITSTEED NEWS
            </a>
        </div>
    </header>

    <!-- CONTAINER BOX VIEW -->
    <main class="flex-grow container mx-auto px-4 py-8 max-w-4xl">
        
        <!-- Back Action Control Trigger -->
        <a href="index.html" class="mb-6 inline-flex items-center gap-2 text-sm font-semibold text-slate-700 hover:text-red-600 transition group">
            <span class="transform group-hover:-translate-x-1 transition duration-150">←</span> Back to Video Directory
        </a>

        <!-- Display Canvas View Assembly -->
        <div id="content-container" class="opacity-0 transition duration-300">
            <!-- Video Presentation Unit -->
            <div class="bg-black rounded-xl overflow-hidden shadow-xl aspect-video mb-6">
                <iframe id="player-frame" class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>

            <!-- Content Presentation Text Summary Meta Container -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="flex items-center gap-3 mb-3">
                    <span id="detail-category" class="bg-red-100 text-red-700 text-xs font-bold px-2.5 py-1 rounded-full uppercase tracking-wider">Category</span>
                    <span id="detail-date" class="text-sm text-slate-400">Date String</span>
                </div>
                <h1 id="detail-title" class="text-2xl md:text-3xl font-bold text-slate-900 mb-4">Loading Title Parameters...</h1>
                <hr class="my-4 border-gray-100">
                <h3 class="text-md font-bold text-slate-800 uppercase tracking-wide mb-2">Detailed Context Summary</h3>
                <p id="detail-summary" class="text-slate-600 leading-relaxed whitespace-pre-line"></p>
            </div>
        </div>

        <!-- ERROR PANEL -->
        <div id="error-panel" class="hidden p-6 bg-red-50 border border-red-200 rounded-xl text-red-800 text-center">
            <h3 class="font-bold text-lg mb-1">Failed to Display Video</h3>
            <p id="error-message" class="text-sm font-mono mt-2"></p>
            <a href="index.html" class="mt-4 inline-block px-4 py-2 bg-red-600 text-white font-semibold rounded-lg text-sm">Return Home</a>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 text-sm py-6 border-t border-slate-800">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 BitSteed Media Network.</p>
        </div>
    </footer>

    <!-- LOGIC SYSTEM PROCESSING ENGINE -->
    <script>
        // Fix: Improved ID parser that cleanly handles full URLs, Shorts, and raw 11-char IDs
        function extractCleanYouTubeId(urlString) {
            if (!urlString) return null;
            
            // Trim whitespace first
            const cleanUrl = urlString.trim();
            
            // If it's already just an 11-character alpha-numeric ID, return it directly
            if (cleanUrl.length === 11 && !cleanUrl.includes('/') && !cleanUrl.includes('.')) {
                return cleanUrl;
            }
            
            const patterns = [
                /youtube\.com\/watch\?v=([^&#\?]+)/,
                /youtu\.be\/([^&#\?]+)/,
                /youtube\.com\/shorts\/([^&#\?]+)/,
                /youtube\.com\/embed\/([^&#\?]+)/
            ];
            
            for (let regex of patterns) {
                const matches = cleanUrl.match(regex);
                if (matches && matches[1]) return matches[1];
            }
            return null;
        }

        async function initDetailPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetVideoId = urlParams.get('v');

            if (!targetVideoId) {
                displayHalt("Invalid Address Context: No video identifier provided in URL (?v=vid_001).");
                return;
            }

            try {
                // Fetch dataset from your github repository
                const response = await fetch('https://bitsteed.github.io/videos.json', { cache: "no-store" });
                if (!response.ok) throw new Error("Could not access data storage nodes.");
                
                const videos = await response.json();
                
                // Matches the '?v=' parameter against the "id" key in your JSON file
                const matchedRecord = videos.find(v => v.id === targetVideoId);

                if (!matchedRecord) {
                    throw new Error(`The requested video identifier "${targetVideoId}" could not be found in our network registry.`);
                }

                const rawYoutubeId = extractCleanYouTubeId(matchedRecord.youtube_url);
                
                if (!rawYoutubeId) {
                    throw new Error("Unable to extract a valid 11-character YouTube video stream code.");
                }

                // Fix: Removed the restrictive &origin parameter to allow seamless local testing (localhost / file://)
                document.getElementById('player-frame').src = `https://www.youtube.com/embed/${rawYoutubeId}?autoplay=1&rel=0`;
                
                // Bind element data components directly to DOM
                document.getElementById('detail-category').innerText = matchedRecord.category || 'News';
                document.getElementById('detail-date').innerText = matchedRecord.date || '';
                document.getElementById('detail-title').innerText = matchedRecord.title;
                document.getElementById('detail-summary').innerText = matchedRecord.summary || matchedRecord.description || '';
                
                document.title = `${matchedRecord.title} - BitSteed News`;

                // Display elements container once loaded smoothly
                document.getElementById('content-container').classList.remove('opacity-0');
            } catch (err) {
                displayHalt(err.message);
            }
        }

        function displayHalt(messageText) {
            document.getElementById('content-container').classList.add('hidden');
            const errorPanel = document.getElementById('error-panel');
            errorPanel.classList.remove('hidden');
            document.getElementById('error-message').innerText = messageText;
        }

        window.addEventListener('DOMContentLoaded', initDetailPage);
    </script>
</body>
</html>
