<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitSteed News Hub</title>
    
    <meta property="og:type" content="video.other">
    <meta property="og:title" content="BitSteed News Hub - Video Reports">
    <meta property="og:description" content="Dynamic streaming feeds and broadcasts deployed from static data stores.">
    <meta id="og-url" property="og:url" content="https://bitsteed.github.io/">
    <meta id="og-image" property="og:image" content="https://bitsteed.github.io/logo.jpg">

    <meta name="twitter:card" content="summary_large_image">
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#" onclick="navigateToMaster(); return false;" class="text-2xl font-black tracking-wider text-red-500 flex items-center gap-2">
                <span class="bg-red-600 text-white px-2 py-0.5 rounded text-sm">LIVE</span> BITSTEED NEWS
            </a>
            <nav class="hidden md:flex space-x-6 text-sm font-medium">
                <a href="#" onclick="navigateToMaster(); return false;" class="hover:text-red-400 transition">Latest Feed</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8">
        
        <div id="error-panel" class="hidden max-w-2xl mx-auto mb-6 p-4 bg-red-50 border border-red-200 rounded-xl text-red-800">
            <h3 class="font-bold text-lg mb-1">Data Fetching Error</h3>
            <p id="error-message" class="text-sm font-mono"></p>
        </div>

        <section id="master-page" class="block">
            <div class="mb-8 border-b border-gray-200 pb-4">
                <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">Video Reports Hub</h1>
                <p class="text-gray-500 mt-1">Dynamic static deployment rendering streaming feeds.</p>
            </div>
            <div id="video-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="animate-pulse bg-gray-200 h-64 rounded-xl"></div>
            </div>
        </section>

        <section id="detail-page" class="hidden max-w-4xl mx-auto">
            <button onclick="navigateToMaster()" class="mb-6 inline-flex items-center gap-2 text-sm font-semibold text-slate-700 hover:text-red-600 transition group">
                <span class="transform group-hover:-translate-x-1 transition duration-150">←</span> Back to Video Directory
            </button>

            <div class="bg-black rounded-xl overflow-hidden shadow-xl aspect-video mb-6">
                <iframe id="player-frame" class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4 pb-4 border-b border-gray-100">
                    <div class="flex items-center gap-3">
                        <span id="detail-category" class="bg-red-100 text-red-700 text-xs font-bold px-2.5 py-1 rounded-full uppercase tracking-wider">Category</span>
                        <span id="detail-date" class="text-sm text-gray-400">Date</span>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold text-slate-500 uppercase tracking-wide mr-1">Share Hub:</span>
                        <button onclick="copyShareLink()" class="p-2 bg-slate-100 hover:bg-red-600 hover:text-white rounded-lg transition text-slate-600" title="Copy Link">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 0 1 1.242 7.244l-4.5 4.5a4.5 4.5 0 0 1-6.364-6.364l1.757-1.757m13.35-.622 1.757-1.757a4.5 4.5 0 0 0-6.364-6.364l-4.5 4.5a4.5 4.5 0 0 0 1.242 7.244" />
                            </svg>
                        </button>
                        <button onclick="shareToFacebook()" class="p-2 bg-blue-100 hover:bg-blue-600 hover:text-white rounded-lg transition text-blue-600" title="Share on Facebook">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="w-4 h-4" viewBox="0 0 16 16">
                                <path d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951z"/>
                            </svg>
                        </button>
                        <button onclick="shareToX()" class="p-2 bg-slate-100 hover:bg-black hover:text-white rounded-lg transition text-slate-900" title="Share on X">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="w-4 h-4" viewBox="0 0 16 16">
                                <path d="M12.6.75h2.454l-5.36 6.142L16 15.25h-4.937l-3.867-5.056-4.425 5.056H.316l5.733-6.57L0 .75h5.063l3.495 4.633L12.6.75Zm-.86 13.028h1.36L4.323 2.145H2.865l8.875 11.633Z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <h1 id="detail-title" class="text-2xl md:text-3xl font-bold text-slate-900 mb-4">Video Title</h1>
                <h3 class="text-md font-bold text-slate-800 uppercase tracking-wide mb-2">Detailed Context Summary</h3>
                <p id="detail-summary" class="text-gray-600 leading-relaxed whitespace-pre-line">Content summary details.</p>
            </div>
        </section>

    </main>

    <footer class="bg-slate-900 text-slate-400 text-sm py-6 mt-12 border-t border-slate-800">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 BitSteed Distribution Media.</p>
        </div>
    </footer>

    <script>
        let runtimeDatabase = [];
        let currentActiveVideo = null;

        function extractCleanYouTubeId(urlString) {
            if (!urlString) return null;
            const patterns = [
                /youtube\.com\/watch\?v=([^&#\?]+)/,
                /youtu\.be\/([^&#\?]+)/,
                /youtube\.com\/shorts\/([^&#\?]+)/
            ];
            for (let regex of patterns) {
                const matches = urlString.trim().match(regex);
                if (matches && matches[1]) return matches[1];
            }
            return null;
        }

        async function runApplicationInitialization() {
            try {
                // Fetch using absolute production URL target directly
                const liveResponse = await fetch('https://bitsteed.github.io/videos.json', { cache: "no-store" });
                if (!liveResponse.ok) throw new Error(`HTTP Error: ${liveResponse.status}`);
                
                runtimeDatabase = await liveResponse.json();
                executeMasterLayoutRender(runtimeDatabase);

                // Check URL for deep link query param "?v=YOUR_VIDEO_ID"
                const urlParams = new URLSearchParams(window.location.search);
                const videoParamId = urlParams.get('v');

                if (videoParamId) {
                    showDetailPage(videoParamId, false); // display detail page instantly
                }
            } catch (err) {
                document.getElementById('video-grid').innerHTML = '';
                document.getElementById('error-panel').classList.remove('hidden');
                document.getElementById('error-message').innerText = err.message;
            }
        }

        function executeMasterLayoutRender(records) {
            const gridNode = document.getElementById('video-grid');
            gridNode.innerHTML = '';

            records.forEach(item => {
                const componentCard = document.createElement('div');
                componentCard.className = "bg-white rounded-xl shadow-sm hover:shadow-md transition duration-200 overflow-hidden border border-gray-100 flex flex-col cursor-pointer group";
                componentCard.onclick = () => showDetailPage(item.id, true);

                componentCard.innerHTML = `
                    <div class="relative overflow-hidden aspect-video bg-slate-900">
                        <img src="${item.thumbnail}" alt="Thumbnail" class="w-full h-full object-cover group-hover:scale-102 transition duration-300" loading="lazy">
                    </div>
                    <div class="p-5 flex-grow flex flex-col justify-between">
                        <div>
                            <span class="text-xs font-bold tracking-widest text-red-600 uppercase mb-1.5 block">${item.category}</span>
                            <h2 class="font-bold text-base text-slate-900 line-clamp-2 group-hover:text-red-600 transition">${item.title}</h2>
                        </div>
                    </div>
                `;
                gridNode.appendChild(componentCard);
            });
        }

        function showDetailPage(targetId, updateHistory = true) {
            const referenceItem = runtimeDatabase.find(element => element.id === targetId);
            if (!referenceItem) return;

            currentActiveVideo = referenceItem;
            const structuredId = extractCleanYouTubeId(referenceItem.youtube_url);
            
            // 1. Get current site origin dynamically (e.g., https://bitsteed.github.io)
            const currentOrigin = window.location.origin;

            // 2. Build the secure YouTube embed string containing the domain origin parameter
            const playerFrame = document.getElementById('player-frame');
            playerFrame.src = `https://www.youtube.com/embed/${structuredId}?autoplay=1&rel=0&origin=${encodeURIComponent(currentOrigin)}`;
            
            // 3. Force the iframe element to explicitly broadcast cross-origin referrer tracking data
            playerFrame.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');

            // Update metadata content interfaces
            document.getElementById('detail-category').innerText = referenceItem.category;
            document.getElementById('detail-date').innerText = referenceItem.date;
            document.getElementById('detail-title').innerText = referenceItem.title;
            document.getElementById('detail-summary').innerText = referenceItem.summary;

            // Inject parameters into the live browser URL state bar safely without page refreshes
            if (updateHistory) {
                const newUrl = `${window.location.origin}${window.location.pathname}?v=${targetId}`;
                window.history.pushState({ path: newUrl }, '', newUrl);
            }

            // Update DOM Meta parameters dynamically for active sessions
            document.title = referenceItem.title;

            document.getElementById('master-page').classList.add('hidden');
            document.getElementById('detail-page').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function navigateToMaster() {
            currentActiveVideo = null;
            document.getElementById('detail-page').classList.add('hidden');
            document.getElementById('master-page').classList.remove('hidden');
            document.getElementById('player-frame').src = '';
            document.title = "BitSteed News Hub";

            // Clean the tracking parameters from URL
            const cleanUrl = `${window.location.origin}${window.location.pathname}`;
            window.history.pushState({ path: cleanUrl }, '', cleanUrl);
        }

        // SOCIAL INTENT METHODS
        function generateShareUrl() {
            if (!currentActiveVideo) return window.location.href;
            return `${window.location.origin}${window.location.pathname}?v=${currentActiveVideo.id}`;
        }

        function copyShareLink() {
            const targetLink = generateShareUrl();
            navigator.clipboard.writeText(targetLink).then(() => {
                alert("Link copied to clipboard! You can now share it anywhere.");
            });
        }

        function shareToFacebook() {
            const shareUrl = encodeURIComponent(generateShareUrl());
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${shareUrl}`, '_blank', 'width=600,height=400');
        }

        function shareToX() {
            const shareUrl = encodeURIComponent(generateShareUrl());
            const text = encodeURIComponent(`Check out this video report on BitSteed News: ${currentActiveVideo ? currentActiveVideo.title : ''}`);
            window.open(`https://twitter.com/intent/tweet?url=${shareUrl}&text=${text}`, '_blank', 'width=600,height=400');
        }

        window.addEventListener('DOMContentLoaded', runApplicationInitialization);
    </script>
</body>
</html>
