<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitSteed News Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">

    <!-- GLOBAL TOP BANNER -->
    <header class="bg-slate-900 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black tracking-wider text-red-500 flex items-center gap-2">
                <span class="bg-red-600 text-white px-2 py-0.5 rounded text-sm animate-pulse">LIVE</span> BITSTEED NEWS
            </a>
            <nav class="hidden md:flex space-x-6 text-sm font-semibold tracking-wide uppercase">
                <a href="index.html" class="text-red-400">Latest Feed</a>
            </nav>
        </div>
    </header>

    <!-- CONTENT FRAME -->
    <main class="flex-grow container mx-auto px-4 py-8">
        <div class="mb-8 border-b border-gray-200 pb-4">
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">Video Reports Directory</h1>
            <p class="text-slate-500 mt-1">Broadcast distributions reading live updates from data streams.</p>
        </div>
        
        <!-- Video Directory Output Canvas -->
        <div id="video-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Loading Skeleton Blocks -->
            <div class="animate-pulse bg-gray-200 h-64 rounded-xl"></div>
            <div class="animate-pulse bg-gray-200 h-64 rounded-xl hidden sm:block"></div>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 text-sm py-6 border-t border-slate-800">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 BitSteed Media Network.</p>
        </div>
    </footer>

    <script>
        async function initMasterPage() {
            try {
                // Fetch using absolute production path targeting
                const response = await fetch('https://bitsteed.github.io/videos.json', { cache: "no-store" });
                if (!response.ok) throw new Error("HTTP connection error reading database assets.");
                const videos = await response.json();
                
                const gridNode = document.getElementById('video-grid');
                gridNode.innerHTML = '';

                videos.forEach(item => {
                    const card = document.createElement('a');
                    // Point to the dedicated detail.html page using URL search variables
                    card.href = `detail.html?v=${item.id}`;
                    card.className = "bg-white rounded-xl shadow-sm hover:shadow-md transition duration-200 overflow-hidden border border-gray-100 flex flex-col group";

                    card.innerHTML = `
                        <div class="relative overflow-hidden aspect-video bg-slate-900">
                            <img src="${item.thumbnail}" alt="Thumbnail" class="w-full h-full object-cover group-hover:scale-102 transition duration-300" loading="lazy">
                            <div class="absolute inset-0 bg-black/10 flex items-center justify-center group-hover:bg-black/20 transition">
                                <div class="w-12 h-12 bg-red-600 text-white rounded-full flex items-center justify-center shadow-md transform group-hover:scale-110 transition duration-150">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="w-5 h-5 ml-0.5" viewBox="0 0 16 16">
                                        <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        <div class="p-5 flex-grow flex flex-col justify-between">
                            <div>
                                <span class="text-xs font-bold tracking-widest text-red-600 uppercase mb-1.5 block">${item.category}</span>
                                <h2 class="font-bold text-base md:text-lg text-slate-900 line-clamp-2 group-hover:text-red-600 transition leading-snug">${item.title}</h2>
                                <p class="text-slate-500 text-sm mt-2 line-clamp-2">${item.summary}</p>
                            </div>
                            <div class="text-xs text-slate-400 font-semibold mt-4 pt-3 border-t border-gray-100 flex justify-between items-center">
                                <span>${item.date}</span>
                                <span class="text-slate-800 font-bold group-hover:text-red-600 transition">Open Broadcast →</span>
                            </div>
                        </div>
                    `;
                    gridNode.appendChild(card);
                });
            } catch (err) {
                document.getElementById('video-grid').innerHTML = `<p class="text-red-500 font-medium">${err.message}</p>`;
            }
        }
        window.addEventListener('DOMContentLoaded', initMasterPage);
    </script>
</body>
</html>
